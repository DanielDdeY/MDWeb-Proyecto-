<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMLL - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Batang', serif;
            background-color: #fafafa;
            color: #111;
        }
        .admin-container {
            max-width: 1100px;
            margin: 50px auto;
            background: #fff;
            padding: 30px;
            border: 1px solid #eee;
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
        }
        .table {
            border-color: #eee;
            vertical-align: middle;
        }
        .table thead {
            background-color: #f9f9f9;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 1px;
        }
        .img-preview {
            width: 50px;
            height: 60px;
            object-fit: cover;
            background-color: #f0f0f0;
        }
        .btn-action {
            border-radius: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
            padding: 5px 12px;
        }
        .btn-new {
            background-color: #000;
            color: #fff;
            border-radius: 0;
            padding: 10px 20px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 0.85rem;
            text-decoration: none;
        }
        .btn-new:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="container admin-container">
    <div class="header-flex">
        <h1 class="m-0" style="font-size: 1.5rem;">Gestión de Inventario</h1>
        <a th:href="@{/admin/productos/nuevo}" class="btn-new">
            <i class="bi bi-plus-lg"></i> Nueva Prenda
        </a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Prenda</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${productos}">
                <td th:text="${prod.id}">1</td>
                <td>
                    <img th:src="${prod.imagenUrl}" class="img-preview" alt="Thumbnail">
                </td>
                <td>
                    <div th:text="${prod.nombre}" style="font-weight: 500;">Nombre</div>
                    <small class="text-muted" th:text="${prod.genero}">Unisex</small>
                </td>
                <td th:text="${prod.categoria != null ? prod.categoria.nombre : 'Sin categoría'}">Categoría</td>
                <td th:text="'S/ ' + ${#numbers.formatDecimal(prod.precioBase, 1, 2)}">S/ 0.00</td>
                <td class="text-end">
                    <a th:href="@{/admin/productos/editar/{id}(id=${prod.id})}" 
                       class="btn btn-outline-dark btn-action me-2">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/admin/productos/eliminar/{id}(id=${prod.id})}" 
                       class="btn btn-outline-danger btn-action"
                       onclick="return confirm('¿Seguro que deseas eliminar esta prenda?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
        <p class="text-muted">No hay productos registrados en el sistema.</p>
    </div>
</div>

</body>
</html>
