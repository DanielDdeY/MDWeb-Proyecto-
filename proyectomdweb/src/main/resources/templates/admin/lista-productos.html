<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMLL - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}" />
</head>
<body>

<!-- Justo después de abrir <body> y antes del container -->
<div th:if="${exito}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>

<div class="container admin-container">
    <div class="header-flex">

            <a th:href="@{/admin/dashboard}" class="btn btn-lmll">
              <i class="bi bi-box-arrow-left me-2"></i> Volver a Dashboard
            </a>

            <h1 class="m-0" style="font-size: 1.5rem;">Gestión de Inventario</h1>
                <a th:href="@{/admin/productos/nuevo}" class="btn-new">
                <i class="bi bi-plus-lg"></i> Nueva Prenda
                </a>
    </div>

    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Imagen</th>
                <th>Prenda</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="prod : ${productos}">
                <td th:text="${prod.id}">1</td>
                <td>
                    <img th:src="${prod.imagenUrl}" class="img-preview" alt="Thumbnail">
                </td>
                <td>
                    <div th:text="${prod.nombre}" style="font-weight: 500;">Nombre</div>
                    <small class="text-muted" th:text="${prod.genero}">Unisex</small>
                </td>
                <td th:text="${prod.categoriaNombre}">Categoría</td>
                <td th:text="'S/ ' + ${#numbers.formatDecimal(prod.precioBase, 1, 2)}">S/ 0.00</td>
                <td class="text-end">
                    <a th:href="@{/admin/productos/editar/{id}(id=${prod.id})}" 
                       class="btn btn-outline-dark btn-action me-2">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <a th:href="@{/admin/productos/eliminar/{id}(id=${prod.id})}" 
                       class="btn btn-outline-danger btn-action"
                       onclick="return confirm('¿Seguro que deseas eliminar esta prenda?')">
                        <i class="bi bi-trash"></i>
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
    
    <div th:if="${#lists.isEmpty(productos)}" class="text-center py-5">
        <p class="text-muted">No hay productos registrados en el sistema.</p>
    </div>
</div>

</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
