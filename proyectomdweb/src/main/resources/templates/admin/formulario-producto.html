<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMLL - Gestion de producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin_styles.css}" />
</head>
<body>

<div th:if="${exito}" class="alert alert-success alert-dismissible fade show m-3" role="alert">
    <span th:text="${exito}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div th:if="${error}" class="alert alert-danger alert-dismissible fade show m-3" role="alert">
    <span th:text="${error}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
</div>
<div class="container">
    <div class="form-card">
        <h2 th:text="${producto.id == null ? 'Nueva Prenda' : 'Editar Prenda'}">Gestión de Producto</h2>
        
        <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
            
            <input type="hidden" th:field="*{id}">

            <div class="mb-4">
                <label class="form-label">Nombre de la Prenda</label>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Polera Oversize Negra" required>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{categoriaId}" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        <option th:each="cat : ${categorias}" 
                                th:value="${cat.id}" 
                                th:text="${cat.nombre}"></option>
                    </select>
                </div>
                <div class="col">
                    <label class="form-label">Género</label>
                    <select th:field="*{genero}" class="form-select" required>
                        <option value="Unisex">Unisex</option>
                        <option value="Hombre">Hombre</option>
                        <option value="Mujer">Mujer</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">URL de la Imagen</label>
                <input type="text" th:field="*{imagenUrl}" class="form-control" placeholder="https://unsplash.com/..." required>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">Precio Base (S/)</label>
                    <input type="number" step="0.01" th:field="*{precioBase}" class="form-control" placeholder="0.00" required>
                </div>
                <div class="col d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" th:field="*{disponibilidad}" id="disp">
                        <label class="form-check-label" for="disp">Disponible</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-save">Guardar en Catálogo</button>
            <div class="text-center mt-3">
                <a th:href="@{/admin/productos}" class="text-decoration-none text-muted small">Cancelar y volver</a>
            </div>
        </form>
    </div>
</div>

</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</html>
