<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LMLL - Gestion de producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
       
        body {
            font-family: 'Batang', serif;
            background-color: #f8f9fa;
            color: #1a1a1a;
        }
        .form-card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 0;
            padding: 40px;
            max-width: 600px;
            margin: 50px auto;
        }
        .form-label {
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            font-weight: 600;
            color: #666;
        }
        .form-control, .form-select {
            border-radius: 0;
            border: 1px solid #ccc;
            padding: 12px;
        }
        .form-control:focus {
            border-color: #000;
            box-shadow: none;
        }
        .btn-save {
            background-color: #000;
            color: #fff;
            border: none;
            border-radius: 0;
            padding: 15px;
            width: 100%;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-save:hover {
            background-color: #333;
            color: #fff;
        }
        h2 {
            font-weight: 500;
            margin-bottom: 30px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2 th:text="${producto.id == null ? 'Nueva Prenda' : 'Editar Prenda'}">Gestión de Producto</h2>
        
        <form th:action="@{/admin/productos/guardar}" th:object="${producto}" method="post">
            
            <input type="hidden" th:field="*{id}">

            <div class="mb-4">
                <label class="form-label">Nombre de la Prenda</label>
                <input type="text" th:field="*{nombre}" class="form-control" placeholder="Ej: Polera Oversize Negra" required>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">Categoría</label>
                    <select th:field="*{categoria}" class="form-select" required>
                        <option value="">Seleccionar...</option>
                        <option th:each="cat : ${categorias}" 
                                th:value="${cat.id}" 
                                th:text="${cat.nombre}"></option>
                    </select>
                </div>
                <div class="col">
                    <label class="form-label">Género</label>
                    <select th:field="*{genero}" class="form-select" required>
                        <option value="Unisex">Unisex</option>
                        <option value="Hombre">Hombre</option>
                        <option value="Mujer">Mujer</option>
                    </select>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">URL de la Imagen</label>
                <input type="text" th:field="*{imagenUrl}" class="form-control" placeholder="https://unsplash.com/..." required>
            </div>

            <div class="row mb-4">
                <div class="col">
                    <label class="form-label">Precio Base (S/)</label>
                    <input type="number" step="0.01" th:field="*{precioBase}" class="form-control" placeholder="0.00" required>
                </div>
                <div class="col d-flex align-items-end">
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" th:field="*{disponibilidad}" id="disp">
                        <label class="form-check-label" for="disp">Disponible</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-save">Guardar en Catálogo</button>
            <div class="text-center mt-3">
                <a th:href="@{/admin/productos}" class="text-decoration-none text-muted small">Cancelar y volver</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
