<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LMLL — La Moda te LLama</title>
    <meta name="description" content="Colecciones de moda peruana. Prendas premium, cortes limpios y estilo auténtico."/>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"/>

    <!-- Bootstrap 5.3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"/>

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"/>

    <!-- Estilos propios -->
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
  </head>

  <body>
    <!-- =============================
         NAVBAR — Bootstrap responsive
         ============================= -->
    <header class="site-header">
      <nav
        class="navbar navbar-expand-md w-100 px-3 py-2"
        aria-label="Navegación principal"
      >
        <!-- Marca -->
        <a class="navbar-brand" th:href="@{/}" aria-label="LMLL Inicio">
          <img
            th:src="@{/img/logo.png}"
            alt="La Moda te LLama"
            style="height: 63px; width: auto"
          />
        </a>

        <!-- Botón hamburguesa (Celular) -->
        <button
          class="navbar-toggler ms-auto me-2"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Abrir menú"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links + acciones -->
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="site-nav navbar-nav me-auto ms-4 gap-2">
            <li class="nav-item">
              <a class="nav-link" th:href="@{/}">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" th:href="@{/productos}">Productos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" th:href="@{/carrito}">Carrito</a>
            </li>
          </ul>

          <!-- Botón carrito -->
          <div class="d-flex align-items-center mt-2 mt-md-0">
            <button
              id="carrito-toggle"
              class="cart-btn"
              aria-label="Abrir carrito lateral"
            >
              <i class="bi bi-bag" style="font-size: 0.95rem"></i>
              <span>Bolsa</span>
              <span class="cart-badge" id="cart-count" style="display: none"
                ></span
              >
            </button>
          </div>
        </div>
      </nav>
    </header>

    <!-- ===================
         CONTENIDO PRINCIPAL
         =================== -->    
    <main class="py-5">
      <div class="container">

        <div class="anim-1 mb-5 text-center checkout-hero">
          <h1 class="display-font checkout-title">
            Tu <em>Bolsa</em>
          </h1>

          <p class="checkout-subtitle">
            Revisa tus artículos antes de finalizar la compra.
          </p>
        </div>

        <div class="row g-5">

          <!-- =========================
              LISTA PRODUCTOS
              ========================= -->

          <div class="col-lg-8 anim-2">

            <div class="carrito-full-container cart-main-panel">

              <div class="carrito-full-header d-none d-md-flex">
                <div class="col-6">Producto</div>
                <div class="col-2 text-center">Precio</div>
                <div class="col-2 text-center">Cantidad</div>
                <div class="col-2 text-end">Total</div>
              </div>

              <div id="cart-items-list"></div>

            </div>

          </div>

          <!-- =========================
              RESUMEN
              ========================= -->

          <div class="col-lg-4 anim-3">

            <div class="checkout-resumen-card sticky-summary">

              <div class="checkout-resumen-header">
                <h3 class="display-font">
                  Resumen del pedido
                </h3>
              </div>

              <div class="checkout-resumen-content">

                <div class="checkout-line">
                  <span>Subtotal</span>
                  <span id="resumen-subtotal">S/ 0.00</span>
                </div>

                <div class="checkout-line">
                  <span>Descuentos</span>
                  <span class="text-brand">- S/ 0.00</span>
                </div>

                <div class="checkout-divider"></div>

                <div class="checkout-total-box">
                  <span class="checkout-total-label">
                    Total
                  </span>

                  <span class="checkout-total-price display-font">
                    S/ <span id="resumen-total">0.00</span>
                  </span>
                </div>

                <!-- ================================
                    BOTON QUE LLAMA A PAGO
                    ================================ -->

                <a
                  th:href="@{/pago}"
                  id="btn-proceder-pago"
                  class="btn-lmll btn-primary-lmll checkout-btn-main btn-glow"
                >
                  Proceder al Pago
                </a>

              </div>

            </div>

          </div>

        </div>
      </div>
    </main>

    <!-- =============
         PIE DE PAGINA
         ============= -->
    <footer class="footer">
      <p>&copy; 2026 LMLL. Todos los derechos reservados.</p>
      <p class="socials">
        <a href="#">www.lmll.com.pe</a> &nbsp;|&nbsp;
        <a href="#">@LmLL_</a> &nbsp;|&nbsp;
      </p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script propio -->
    <script th:src="@{/js/carrito.js}"></script>
  </body>
</html>
