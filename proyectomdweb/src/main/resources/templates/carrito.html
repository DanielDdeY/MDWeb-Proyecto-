<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LMLL — La Moda te LLama</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header">
    <nav class="navbar navbar-expand-md w-100 px-3 py-2">
        <a class="navbar-brand" th:href="@{/}">
            <img th:src="@{/img/logo.png}" alt="LMLL" style="height: 63px;">
        </a>
        <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="site-nav navbar-nav mx-auto gap-1">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/productos}">Productos</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/carrito}">Carrito</a></li>
            </ul>
            <button id="carrito-toggle" class="cart-btn btn-static-1">
                <i class="bi bi-bag"></i> <span>Bolsa</span>
            </button>
        </div>
    </nav>
</header>

<main class="py-5">
    <div class="container">
        <div class="anim-1 mb-4 text-center">
            <h1 class="display-font">Tu <em style="color:var(--brand);">Bolsa</em></h1>
            <p class="text-muted-1">Revisa tus artículos antes de finalizar la compra.</p>
        </div>

        <div class="row g-5">
            <div class="col-lg-8">
                <div class="carrito-full-container">
                    <div class="carrito-full-header d-none d-md-flex fw-bold border-bottom pb-2 mb-3">
                        <div class="col-6">Producto</div>
                        <div class="col-2 text-center">Precio</div>
                        <div class="col-2 text-center">Cantidad</div>
                        <div class="col-2 text-end">Total</div>
                    </div>

                    <div id="cart-items-list">
                        </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card-oferta border p-4 bg-light">
                    <h3 class="mb-4 display-font">Resumen del pedido</h3>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span id="resumen-subtotal">S/ 0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span>Descuentos</span>
                        <span class="text-brand">- S/ 0.00</span>
                    </div>
                    <hr class="divider">
                    <div class="d-flex justify-content-between align-items-end mt-2 mb-4">
                        <span style="font-size: 1.2rem;">Total</span>
                        <span class="display-font text-dark" style="font-size: 2.2rem; font-weight: 600;">
                            S/ <span id="resumen-total">0.00</span>
                        </span>
                    </div>
                    <a th:href="@{/pago}" id="btn-proceder-pago" class="btn btn-dark w-100 py-3 text-uppercase fw-bold letter-spacing-1">Proceder al Pago</a>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="footer py-4 text-center">
    <p>&copy; 2026 LMLL. Todos los derechos reservados.</p>
    <p class="socials">
        <a href="#" class="text-dark text-decoration-none">www.lmll.com.pe</a> &nbsp;|&nbsp;
        <a href="#" class="text-dark text-decoration-none">@LmLL_</a>
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/carrito.js}"></script>
</body>
</html>
