<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - LMLL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body, .display-font, .form-input-lmll, .btn-lmll {
            font-family: 'Batang', serif;
        }
        body {
            background-color: #fafafa;
        }
        .login-container {
            max-width: 450px;
            margin: 8vh auto;
            background: #fff;
            padding: 40px;
            border: 1px solid #eaeaea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-input-lmll {
            border-radius: 0;
            border: 1px solid #ccc;
            padding: 12px 15px;
        }
        .form-input-lmll:focus {
            box-shadow: none;
            border-color: #000;
        }
        .btn-lmll {
            background-color: #000;
            color: #fff;
            border-radius: 0;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 12px;
        }
        .btn-lmll:hover {
            background-color: #333;
            color: #fff;
        }
        .brand-logo {
            height: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-container text-center">
            <a th:href="@{/}">
                <img th:src="@{/img/logo.png}" alt="La Moda te LLama" class="brand-logo">
            </a>
            
            <h1 class="display-font h3 mb-4">Iniciar Sesión</h1>

            <div th:if="${param.exito == 'registro'}" class="alert alert-success text-start p-2 mb-4" style="border-radius: 0; font-size: 0.9rem;">
                <i class="bi bi-check-circle-fill me-2"></i> ¡Cuenta creada con éxito! Por favor, inicia sesión.
            </div>

            <div th:if="${param.error}" class="alert alert-danger text-start p-2 mb-4" style="border-radius: 0; font-size: 0.9rem;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Correo o contraseña incorrectos.
            </div>

            <form th:action="@{/auth/login}" method="POST" class="text-start">
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" name="username" class="form-control form-input-lmll" placeholder="ejemplo@correo.com" required autofocus>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold d-flex justify-content-between">
                        Contraseña
                        <a href="#" class="text-muted" style="font-size: 0.85rem; text-decoration: none;">¿Olvidaste tu contraseña?</a>
                    </label>
                    <input type="password" name="password" class="form-control form-input-lmll" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-lmll w-100 mb-4">Ingresar</button>

                <div class="text-center mt-3" style="font-size: 0.95rem;">
                    ¿No tienes una cuenta? <a th:href="@{/auth/registro}" class="text-dark fw-bold" style="text-decoration: underline;">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
