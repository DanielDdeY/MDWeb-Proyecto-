<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>LMLL — Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Batang', serif;
            background-color: #ffffff;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }
        .error-code {
            font-size: 5rem;
            font-weight: 300;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }
        .btn-home {
            background-color: #000;
            color: #fff;
            border-radius: 0;
            padding: 12px 30px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-home:hover {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="error-code">!</div>
    <h1 th:text="${errorTitulo}">Error</h1>
    <p class="text-muted" th:text="${errorMensaje}">Ha ocurrido un inconveniente inesperado.</p>
    <a th:href="@{/}" class="btn-home">Volver al Inicio</a>
</div>

</body>
</html>
