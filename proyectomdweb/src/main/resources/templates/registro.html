<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - LMLL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body, .display-font, .form-input-lmll, .btn-lmll { font-family: 'Batang', serif; }
        body { background-color: #fafafa; }
        .login-container {
            max-width: 550px;
            margin: 5vh auto;
            background: #fff;
            padding: 40px;
            border: 1px solid #eaeaea;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-input-lmll { border-radius: 0; border: 1px solid #ccc; padding: 12px 15px; }
        .form-input-lmll:focus { box-shadow: none; border-color: #000; }
        .btn-lmll { background-color: #000; color: #fff; border-radius: 0; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; padding: 12px; }
        .btn-lmll:hover { background-color: #333; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-container text-center">
            
            <a th:href="@{/}">
                <img th:src="@{/img/logo.png}" alt="La Moda te LLama" style="height: 60px; margin-bottom: 20px;">
            </a>
            <h1 class="display-font h3 mb-4">Crear una cuenta</h1>

            <div th:if="${param.error == 'email'}" class="alert alert-danger text-start p-2 mb-4" style="border-radius: 0; font-size: 0.9rem;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Este correo electrónico ya está registrado.
            </div>

            <form th:action="@{/auth/registro}" method="POST" class="text-start">
                
                <div class="row g-3 mb-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control form-input-lmll" required autofocus>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Correo Electrónico</label>
                        <input type="email" name="email" class="form-control form-input-lmll" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Contraseña</label>
                        <input type="password" name="password" class="form-control form-input-lmll" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Teléfono (Opcional)</label>
                        <input type="tel" name="telefono" class="form-control form-input-lmll" maxlength="12">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Dirección (Opcional)</label>
                        <input type="text" name="direccion" class="form-control form-input-lmll">
                    </div>
                </div>

                <button type="submit" class="btn btn-lmll w-100 mb-4 mt-2">Registrarme</button>

                <div class="text-center mt-3" style="font-size: 0.95rem;">
                    ¿Ya tienes una cuenta? <a th:href="@{/auth/login}" class="text-dark fw-bold" style="text-decoration: underline;">Inicia sesión aquí</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
