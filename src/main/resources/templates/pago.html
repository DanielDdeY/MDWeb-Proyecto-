<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>LMLL - Finalizar Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="bg-light">

    <header class="site-header bg-dark text-white py-3 mb-5">
        <div class="container">
            <a href="index.html" class="text-white text-decoration-none h4">La Moda te LLama</a>
        </div>
    </header>

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm p-4">
                    <h2 class="mb-4 text-center">Información de Pago</h2>
                    
                    <form class="needs-validation">
                        
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre en la tarjeta</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Nombre Apellido" required>
                        </div>

                        <div class="mb-3">
                            <label for="tarjeta" class="form-label">Número de tarjeta</label>
                            <input type="text" class="form-control" id="tarjeta" 
                                   placeholder="0000 0000 0000 0000" 
                                   required 
                                   maxlength="16" 
                                   pattern="[0-9]{16}" 
                                   title="Debe ingresar los 16 números de su tarjeta">
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="expiracion" class="form-label">Expiración (MM/YY)</label>
                                <input type="text" class="form-control" id="expiracion" 
                                       placeholder="MM/YY" 
                                       required 
                                       maxlength="5" 
                                       pattern="[0-9]{2}/[0-9]{2}">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="cvv" class="form-label">CVV</label>
                                <input type="password" class="form-control" id="cvv" 
                                       placeholder="123" 
                                       required 
                                       maxlength="3" 
                                       pattern="[0-9]{3}">
                            </div>
                        </div>

                        <hr class="my-4">

                        <button class="w-100 btn btn-primary btn-lg" type="submit">
                            Confirmar Pago Seguro
                        </button>
                    </form>
                </div>
                
                <p class="text-center mt-3">
                    <a href="carrito.html" class="text-muted text-decoration-none small">← Volver al carrito</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="py-4 text-center text-muted">
        <small>&copy; 2026 LMLL - Compra Segura</small>
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function (event) {
            if (!this.checkValidity()) {
                event.preventDefault()
                event.stopPropagation()
            } else {
                event.preventDefault()
                alert('¡Simulación de pago exitosa! Gracias por su compra.')
            }
            this.classList.add('was-validated')
        }, false)
    </script>
</body>

</html>
